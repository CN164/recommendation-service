version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/recommendations?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - SERVER_PORT=8080
      - CACHE_TTL_MINUTES=10
      - WORKER_POOL_SIZE=10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - recommendation-net

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=recommendations
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d recommendations"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - recommendation-net

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - recommendation-net

networks:
  recommendation-net:
    driver: bridge

volumes:
  postgres_data:
